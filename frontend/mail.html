<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Board - Mail</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
        /* ===========================
       Mail layout (two-column)
       =========================== */
        .mail-layout {
            display: grid;
            grid-template-columns: 400px 1px 1fr;
            gap: 0;
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
            min-height: calc(100vh - 60px);
        }

        /* ===========================
       Panel (shared)
       =========================== */
        .panel {
            padding: 0 1.5rem;
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .panel-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-3);
            flex: 1;
        }

        .inbox-count {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            background: var(--surface-2);
            color: var(--text-3);
            padding: 0.1rem 0.45rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            min-width: 24px;
            text-align: center;
        }

        /* ===========================
       Compose panel
       =========================== */
        .compose-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        /* Quick-command shortcut buttons */
        .cmd-row {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .cmd-btn {
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text-3);
            padding: 0.3rem 0.7rem;
            border-radius: var(--radius-sm);
            font-family: var(--font-mono);
            font-size: 0.72rem;
            font-weight: 500;
            cursor: pointer;
            transition: border-color var(--transition), color var(--transition), background var(--transition);
            letter-spacing: 0.04em;
        }

        .cmd-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        /* Command syntax hint */
        .cmd-hint {
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--green);
            min-height: 1.1em;
            transition: color var(--transition);
        }

        /* Body textarea override */
        textarea.field-input {
            resize: vertical;
            min-height: 90px;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            line-height: 1.6;
        }

        /* Send button full width */
        #btn-send {
            width: 100%;
            padding: 0.65rem 1rem;
            font-size: 0.88rem;
        }

        #btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .send-error {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            color: var(--red);
            min-height: 1em;
        }

        /* ===========================
       Inbox panel
       =========================== */
        .inbox-panel {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .last-update {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            color: var(--text-3);
            margin-bottom: 1rem;
            min-height: 1em;
        }

        .btn-refresh {
            font-family: var(--font-mono);
            font-size: 0.72rem;
            padding: 0.25rem 0.6rem;
            border-radius: 4px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-3);
            cursor: pointer;
            transition: border-color var(--transition), color var(--transition);
        }

        .btn-refresh:hover {
            border-color: var(--border-hover);
            color: var(--text-2);
        }

        .mail-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        /* ===========================
       Mail card
       =========================== */
        .mail-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: border-color var(--transition);
        }

        .mail-card.is-new {
            animation: card-in 200ms ease both;
        }

        @keyframes card-in {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .mail-card:hover {
            border-color: var(--border-hover);
        }

        /* Command = subtle accent left border */
        .mail-card.command {
            border-left: 3px solid var(--accent-dim);
        }

        /* Reply  = subtle green left border */
        .mail-card.reply {
            border-left: 3px solid var(--green-dim);
        }

        .mail-card-header {
            padding: 0.75rem 1rem;
            cursor: pointer;
            user-select: none;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .mail-card-top {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            min-width: 0;
        }

        .mail-type-badge {
            flex-shrink: 0;
            font-family: var(--font-mono);
            font-size: 0.63rem;
            font-weight: 500;
            padding: 0.1rem 0.45rem;
            border-radius: 4px;
            letter-spacing: 0.04em;
        }

        .mail-type-badge.command {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid rgba(79, 142, 247, 0.2);
        }

        .mail-type-badge.reply {
            background: var(--green-dim);
            color: var(--green);
            border: 1px solid rgba(62, 207, 142, 0.2);
        }

        .mail-subject {
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }

        .mail-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .mail-from {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            color: var(--text-3);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mail-date {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-3);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .mail-expand-icon {
            font-size: 0.7rem;
            color: var(--text-3);
            transition: transform var(--transition);
            flex-shrink: 0;
        }

        .mail-card.expanded .mail-expand-icon {
            transform: rotate(180deg);
        }

        /* Collapsed body: hidden */
        .mail-card-body {
            display: none;
            padding: 0 1rem 0.85rem;
            border-top: 1px solid var(--border);
        }

        .mail-card.expanded .mail-card-body {
            display: block;
        }

        .mail-body {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-2);
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
            padding-top: 0.75rem;
        }

        .mail-body-empty {
            color: var(--text-3);
            font-style: italic;
        }

        /* ===========================
       Polling indicator
       =========================== */
        .poll-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-3);
            margin-right: 0.3rem;
            vertical-align: middle;
            transition: background 0.2s;
        }

        .poll-dot.active {
            background: var(--green);
            box-shadow: 0 0 5px var(--green);
        }

        /* ===========================
       Responsive
       =========================== */
        @media (max-width: 760px) {
            .mail-layout {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1px auto;
                padding: 1.25rem 1rem 3rem;
            }

            .panel {
                padding: 0;
            }

            .column-divider {
                margin: 1.5rem 0;
                height: 1px;
                width: 100%;
            }

            .header-title {
                display: none;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <span class="logo">⬡</span>
            <h1 class="header-title">Task Board</h1>
        </div>
        <nav class="nav" aria-label="Paginanavigatie">
            <a href="index.html" class="nav-link">⬜ Board</a>
            <a href="mail.html" class="nav-link active">✉ Mail</a>
        </nav>
        <div class="header-right">
            <span class="ws-indicator" id="poll-indicator">
                <span class="poll-dot" id="poll-dot"></span>
                <span class="ws-label" id="poll-label"
                    style="font-family: var(--font-mono); font-size: 0.72rem; color: var(--text-3);">Laden…</span>
            </span>
        </div>
    </header>

    <!-- Mail layout -->
    <main class="mail-layout">

        <!-- LEFT: Compose -->
        <section class="panel compose-panel" aria-label="E-mail opstellen">
            <div class="panel-header">
                <span class="panel-title">Opstellen</span>
            </div>

            <!-- Quick-command shortcuts -->
            <div class="cmd-row" role="group" aria-label="Snelcommando's">
                <button class="cmd-btn" data-cmd="ADD ">ADD</button>
                <button class="cmd-btn" data-cmd="DONE ">DONE</button>
                <button class="cmd-btn" data-cmd="DELETE ">DELETE</button>
                <button class="cmd-btn" data-cmd="LIST">LIST</button>
            </div>

            <!-- Hint -->
            <div class="cmd-hint" id="cmd-hint" aria-live="polite"></div>

            <!-- Fields -->
            <div class="field">
                <label class="field-label" for="input-to">Aan</label>
                <input class="field-input" id="input-to" type="email" value="test@taskboard.local"
                    autocomplete="off" />
            </div>

            <div class="field">
                <label class="field-label" for="input-subject">
                    Onderwerp <span class="required">*</span>
                </label>
                <input class="field-input" id="input-subject" type="text" placeholder="bijv. ADD Mijn taak"
                    autocomplete="off" />
            </div>

            <div class="field">
                <label class="field-label" for="input-body">Bericht (optioneel)</label>
                <textarea class="field-input" id="input-body" placeholder="Optionele berichttekst…"></textarea>
            </div>

            <button class="btn-primary" id="btn-send">Versturen →</button>
            <span class="send-error" id="send-error" role="alert"></span>
        </section>

        <!-- Divider -->
        <div class="column-divider" aria-hidden="true"></div>

        <!-- RIGHT: Inbox -->
        <section class="panel inbox-panel" aria-label="Inbox">
            <div class="panel-header">
                <span class="panel-title">Inbox</span>
                <span class="inbox-count" id="inbox-count" aria-label="Aantal berichten">0</span>
                <button class="btn-refresh" id="btn-refresh" title="Verversen">↻ Verversen</button>
            </div>

            <div class="last-update" id="last-update" aria-live="polite"></div>

            <div class="mail-list" id="mail-list" role="list"></div>

            <div class="empty-state hidden" id="inbox-empty" aria-live="polite">
                <span class="empty-icon">✉</span>
                <p>Geen berichten. Verstuur een commando om te beginnen.</p>
            </div>
        </section>

    </main>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container" aria-live="polite"></div>

    <script src="mail.js"></script>
</body>

</html>
